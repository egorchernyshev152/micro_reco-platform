server:
  port: 8083

spring:
  application:
    name: recommender-service

logging:
  level:
    root: INFO
    com.example.recommender: DEBUG

clients:
  catalog:
    base-url: http://localhost:8081
  event:
    base-url: http://localhost:8082
  http:
    connect-timeout: 2s
    read-timeout: 5s
    response-timeout: 5s

security:
  jwt:
    # Shared secret for inter-service JWT (HS256); override via env in non-dev.
    secret: change-me-please-32-characters-key
