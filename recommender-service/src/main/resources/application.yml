server:
  port: 8083

spring:
  application:
    name: recommender-service
  datasource:
    url: jdbc:postgresql://localhost:5433/recommender-db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

logging:
  level:
    root: INFO
    com.example.recommender: DEBUG

clients:
  catalog:
    base-url: http://localhost:8081
  event:
    base-url: http://localhost:8082
  http:
    connect-timeout: 2s
    read-timeout: 5s
    response-timeout: 5s

app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
